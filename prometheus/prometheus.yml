global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: frontend_server
    static_configs:
      - targets: ['frontend:3000']
  - job_name: backend_server
    static_configs:
      - targets: ['backend:8080']

rule_files:
    - "alert_rules.yml"