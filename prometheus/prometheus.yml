global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus-service:9090"] 

  - job_name: frontend_server
    static_configs:
      - targets: ['todo-frontend-service:80']

  - job_name: backend_server
    static_configs:
      - targets: ['todo-backend-service:8080'] 

rule_files:
    - "alert_rules.yml"