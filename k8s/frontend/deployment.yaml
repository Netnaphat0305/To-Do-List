apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      containers:
      - name: todo-frontend
        image: nattasitfluk/todo-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL  # เปลี่ยนชื่อให้ตรงกับที่โค้ดคุณใช้ (เช่น NEXT_PUBLIC_API_URL)
          value: "http://localhost:8080/api/v1" # คุยภายใน K8s Cluster ผ่าน Service Name