apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
      - name: todo-backend
        image: nattasitfluk/todo-backend:latest # ใช้ Image ที่คุณ Build สำเร็จ
        ports:
        - containerPort: 8080